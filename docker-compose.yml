version: '3.8'

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: edutrack
      POSTGRES_PASSWORD: edutrack123
      POSTGRES_DB: edutrack
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    depends_on:
      - db
    environment:
      DATABASE_URL: postgresql://edutrack:edutrack123@db:5432/edutrack

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data: